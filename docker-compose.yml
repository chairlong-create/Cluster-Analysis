version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - db-data:/data
    environment:
      - DATABASE_FILE=/data/cluster-analysis.db
      - AUTH_SECRET=${AUTH_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    restart: unless-stopped

volumes:
  db-data:
